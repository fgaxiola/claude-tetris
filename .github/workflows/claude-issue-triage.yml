name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: |
            Analyze GitHub issue #${{ github.event.issue.number }} in ${{ github.repository }}.

            1. Read the issue title and body with `gh issue view ${{ github.event.issue.number }}`.
            2. Inspect the repository source as needed to understand the affected area.
            3. Apply the appropriate labels with `gh issue edit ${{ github.event.issue.number }} --add-label "<label>"`.
               - Use existing repo labels when they fit (check with `gh label list`).
               - Create a new label with `gh label create` only if no existing label fits (e.g. `bug`, `enhancement`, `question`, or an area label like `game-logic`, `rendering`, `docs`).
            4. Post one comment on the issue (`gh issue comment ${{ github.event.issue.number }} --body "..."`) containing a general diagnosis, formatted in concise GitHub-flavored Markdown (short bullet points, `code` spans for file/symbol names, no long paragraphs):
               - Root cause / affected code area (reference file:line where relevant).
               - Suggested approach for a fix or implementation, at a high level — do not write the implementation itself.
               - Any risks or open questions that need clarifying before coding starts.
            5. Do not modify any files in the repository. Do not open a pull request. Only label and comment on the issue.
            6. Write the issue comment in Spanish, even though code snippets, file paths, and identifiers stay in English.

          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(gh label create:*)"'
