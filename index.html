<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      var stored = localStorage.getItem('tetris-theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">🌙</button>
    <button id="mute-toggle" class="mute-toggle" aria-label="Silenciar sonido" title="Silenciar sonido">🔊</button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <div class="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="powerup-toast" class="powerup-toast"></div>
      </div>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="leaderboard" class="leaderboard hidden">
          <p class="leaderboard-heading">TOP SCORES</p>
          <ol id="leaderboard-list"></ol>
          <p class="leaderboard-stats">
            <span>Best Combo: <span id="best-combo-value">0</span></span>
            <span>Max Lines: <span id="max-lines-value">0</span></span>
          </p>
        </div>
        <div id="name-entry" class="name-entry hidden">
          <input id="player-name-input" type="text" maxlength="12" placeholder="YOUR NAME" autocomplete="off" />
          <button id="submit-name-btn">Save</button>
        </div>
        <button id="restart-btn">Reiniciar</button>
        <button id="reset-scores-btn" class="reset-scores-btn hidden">Reset Leaderboard</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
